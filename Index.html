        .container {

        .app-card {
            background: white;

            padding: 15px;

        }

        .app-card img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 10px;
        }

        .app-card h3 {
            margin: 10px 0;
        }

        .download-btn {
            display: inline-block;
            padding: 10px 15px;
            background: green;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .download-btn:hover {
            background: darkgreen;
        }
    </style>
